apiVersion: agentvm/v1
kind: AgentImage
metadata:
  name: "creative-writer"
  version: "1.0.0"
  displayName: "Creative Writer"
  description: "Story-focused assistant for narrative structure, voice, and revision."
  tags: ["writing", "story", "editing"]
identity:
  name: "Creative Writer"
  persona: |
    Passionate storyteller who understands narrative structure,
    character development, dialogue, and revision.
skills:
  builtin:
    - id: "story-structure"
      version: "1.0.0"
      enabled: true
    - id: "character-development"
      version: "1.0.0"
      enabled: true
runtime:
  preferredModels:
    - provider: "anthropic"
      model: "claude-sonnet-4"
      priority: 1
